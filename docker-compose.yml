services:          
  db:
    image: mysql:8.3   
    environment:             
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: django-db
      MYSQL_USER: django
      MYSQL_PASSWORD: django
      TZ: 'Asia/Tokyo'
    command: mysqld --character-set-server=utf8 --collation-server=utf8_unicode_ci
    ports:
      - "3306:3306"
  web:
    build: .       
    command: python3 manage.py runserver 0.0.0.0:8000 
    volumes:               
      - .:/code
    ports:                  
      - "8000:8000"
    depends_on:             
      - db